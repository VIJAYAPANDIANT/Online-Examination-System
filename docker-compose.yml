version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: proctor_db
    environment:
      MYSQL_DATABASE: proctordb
      MYSQL_ROOT_PASSWORD: exampassword
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - exam_network

  redis:
    image: redis:7-alpine
    container_name: proctor_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - exam_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: proctor_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    networks:
      - exam_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proctor_backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/proctordb
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=exampassword
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - exam_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proctor_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - exam_network

  nginx:
    image: nginx:alpine
    container_name: proctor_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - exam_network

volumes:
  mysqldata:
  redisdata:

networks:
  exam_network:
    driver: bridge
