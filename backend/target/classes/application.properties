spring.application.name=proctor

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/proctordb?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=exampassword

# Hibernate Properties 
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# External Services auto-configuration enabled
# (Removed spring.autoconfigure.exclude to support Redis and RabbitMQ in Docker)
